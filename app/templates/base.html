<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Political Pulse India{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    {% if show_nav|default(true) %}
    <nav class="navbar navbar-expand-lg glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Political Pulse India</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="siteNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/approval{% if user_email %}?email={{ user_email|urlencode }}{% endif %}">Approval Ratings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pulse{% if user_email %}?email={{ user_email|urlencode }}{% endif %}">Public Pulse</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    {% if user_email %}
                        <span class="navbar-text text-light">Profile · {{ user_email }}</span>
                    {% endif %}
                    {% if user_email and user_email|lower == ADMIN_EMAIL|lower %}
                        <a class="btn btn-outline-light btn-sm" href="/admin?email={{ user_email|urlencode }}">Admin</a>
                    {% endif %}
                    <button id="logout-btn" class="btn btn-outline-light btn-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='firebase-auth.js') }}"></script>
</body>
</html>
